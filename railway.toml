[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'npx prisma db push --accept-data-loss --skip-generate 2>&1 && echo \"[railway] Starting node...\" && ls dist/ 2>&1 && node dist/main 2>&1'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
